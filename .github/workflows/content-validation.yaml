name: content-validation

# WP-322 Ф11: Pack-sufficiency gate.
# Проверяет, что все понятия из `вводится:` в structure-guide-N.md
# зарегистрированы в PACK-personal/ontology.md §2.
#
# Запускается на PR (только structure-guide файлы) и при push в main.

on:
  pull_request:
    paths:
      - 'specs/v4-reference/*-structure-guide-*.md'
      - 'tools/check-pack-gap.py'
  push:
    branches: [main]
    paths:
      - 'specs/v4-reference/*-structure-guide-*.md'
  workflow_dispatch:
  workflow_call:

jobs:
  pack-gap:
    name: Pack-sufficiency gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DS-principles-curriculum
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PACK-personal
        uses: actions/checkout@v4
        with:
          repository: aisystant/PACK-personal
          path: PACK-personal
          token: ${{ secrets.PACK_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pack-gap (diff-mode for PR, full for push)
        id: packgap_run
        run: |
          START=$(date +%s)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            echo "PR-режим: проверяем только новые вводится относительно ${BASE}"
            python3 tools/check-pack-gap.py specs/v4-reference/ \
              --ontology PACK-personal/ontology.md \
              --diff "${BASE}" 2>&1 | tee /tmp/packgap-output.txt
          else
            echo "Push-режим: полная проверка всех structure-guide файлов"
            python3 tools/check-pack-gap.py specs/v4-reference/ \
              --ontology PACK-personal/ontology.md 2>&1 | tee /tmp/packgap-output.txt
          fi
          EXIT_CODE=${PIPESTATUS[0]}
          END=$(date +%s)
          DURATION=$((END - START))
          TOTAL=$(grep -oP '\d+(?= понятий проверено)' /tmp/packgap-output.txt | tail -1 || echo 0)
          GAPS=$(grep -oP '\d+(?= вне онтологии)' /tmp/packgap-output.txt | tail -1 || echo 0)
          {
            echo "## Pack-sufficiency gate"
            echo "| Метрика | Значение |"
            echo "|---------|----------|"
            echo "| Duration | ${DURATION}s |"
            echo "| Total concepts | $TOTAL |"
            echo "| Gaps | $GAPS |"
            echo "| Exit code | $EXIT_CODE |"
            echo "| Mode | ${{ github.event_name }} |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE

      - name: On failure — hint
        if: failure()
        run: |
          echo "::error title=Pack-sufficiency gate FAIL::Добавьте отсутствующие понятия в PACK-personal/ontology.md §2 (Глоссарий домена) и создайте PR в PACK-personal."
          echo ""
          echo "Шаблон строки для ontology.md §2:"
          echo "| **Понятие** | Определение. ≠ X, ≠ Y | U.Type | PD.FORM.NNN | forming |"

      - name: Create pack-gap issue
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          TITLE="[pack-gap] Pack-sufficiency FAIL в PR #${PR_NUM}"
          
          # Проверяем, нет ли уже открытого issue для этого PR
          EXISTING=$(gh issue list --repo ${{ github.repository }} \
            --label "pack-drift,needs-author-review,automated" \
            --search "${TITLE}" --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Issue уже существует: #$EXISTING"
            exit 0
          fi
          
          # Формируем тело issue
          {
            echo "## Pack-sufficiency gate FAIL"
            echo ""
            echo "Автоматически создано при проверке PR. Некоторые понятия из \`вводится:\` отсутствуют в \`PACK-personal/ontology.md\` §2."
            echo ""
            echo "### Вывод check-pack-gap.py"
            echo '```'
            cat /tmp/packgap-output.txt
            echo '```'
            echo ""
            echo "### Контекст"
            echo "- PR: ${{ github.event.pull_request.html_url }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "### Что делать автору"
            echo "1. Добавить отсутствующие понятия в \`PACK-personal/ontology.md\` §2 (Глоссарий домена)."
            echo "2. Убедиться, что написание понятия в \`вводится:\` совпадает с онтологией."
            echo "3. Перезапустить CI (push в PR)."
            echo "4. Закрыть этот issue после PASS."
          } > /tmp/issue-body.md
          
          gh issue create --repo ${{ github.repository }} \
            --title "${TITLE}" \
            --body-file /tmp/issue-body.md \
            --label "pack-drift,needs-author-review,automated"
