name: v4-lint

on:
  pull_request:
    paths:
      - 'specs/v4-reference/**'
      - 'tools/v4-lint.py'
      - 'tools/smoke-test.sh'
  push:
    branches: [main]
    paths:
      - 'specs/v4-reference/**'
      - 'tools/v4-lint.py'
  schedule:
    # Еженедельный periodic audit: понедельник 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout curriculum repo
        uses: actions/checkout@v4

      - name: Checkout PACK-personal repo
        uses: actions/checkout@v4
        with:
          repository: aisystant/PACK-personal
          path: PACK-personal
          token: ${{ secrets.PACK_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Checkout aisystant/docs (для completeness check)
        uses: actions/checkout@v4
        with:
          repository: aisystant/docs
          path: docs
          token: ${{ secrets.DOCS_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: structure (Этап 2)
        run: python3 tools/v4-lint.py structure specs/v4-reference/

      - name: porter (Этап 8)
        run: python3 tools/v4-lint.py porter specs/v4-reference/

      - name: cross-guide (Этап 10)
        run: python3 tools/v4-lint.py cross-guide specs/v4-reference/

      - name: pack-drift (Этап 14)
        run: |
          python3 tools/v4-lint.py pack-drift specs/v4-reference/ \
            --pack PACK-personal/pack/personal-development/02-domain-entities/formalizations/PD.FORM.089-learner-rcs.md

      - name: completeness (WP-322 Ф3.11)
        run: |
          # Проверяем что каждый SS из structure-guide имеет файл в aisystant/docs.
          # DOCS_CONTENT_DIR — путь к руководствам личного развития.
          # Если docs репо недоступен (приватный + нет токена) — шаг пропускается с предупреждением.
          DOCS_CONTENT="docs/docs/ru/personal-design"
          if [[ -d "$DOCS_CONTENT" ]]; then
            python3 tools/v4-lint.py completeness specs/v4-reference/ \
              --content-dir "$DOCS_CONTENT"
          else
            echo "::warning::completeness: $DOCS_CONTENT не найден — docs репо недоступен или структура изменилась"
            echo "::warning::completeness: проверка пропущена. Запустите локально: v4-lint.py completeness specs/v4-reference/ --content-dir <path-to-docs/docs/ru/personal-design>"
          fi

      - name: smoke-test (фикстуры)
        run: bash tools/smoke-test.sh
