name: v4-lint

on:
  pull_request:
    paths:
      - 'specs/v4-reference/**'
      - 'tools/v4-lint.py'
      - 'tools/smoke-test.sh'
  push:
    branches: [main]
    paths:
      - 'specs/v4-reference/**'
      - 'tools/v4-lint.py'
  schedule:
    # Еженедельный periodic audit: понедельник 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
  workflow_call:

jobs:
  lint:
    name: lint (${{ matrix.check.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - {name: structure,  cmd: "python3 tools/v4-lint.py structure specs/v4-reference/"}
          - {name: porter,     cmd: "python3 tools/v4-lint.py porter specs/v4-reference/"}
          - {name: cross-guide, cmd: "python3 tools/v4-lint.py cross-guide specs/v4-reference/"}
          - {name: pack-drift, cmd: "python3 tools/v4-lint.py pack-drift specs/v4-reference/ --pack PACK-personal/pack/personal-development/02-domain-entities/formalizations/PD.FORM.089-learner-rcs.md"}
    steps:
      - name: Checkout curriculum repo
        uses: actions/checkout@v4

      - name: Checkout PACK-personal repo
        uses: actions/checkout@v4
        with:
          repository: aisystant/PACK-personal
          path: PACK-personal
          token: ${{ secrets.PACK_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run ${{ matrix.check.name }}
        id: lint_run
        run: |
          START=$(date +%s)
          ${{ matrix.check.cmd }} 2>&1 | tee /tmp/lint-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          END=$(date +%s)
          DURATION=$((END - START))
          ERRORS=$(grep -oP 'errors=\K\d+' /tmp/lint-output.txt | tail -1 || echo 0)
          WARNINGS=$(grep -oP 'warnings=\K\d+' /tmp/lint-output.txt | tail -1 || echo 0)
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"
          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"
          echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"
          {
            echo "## v4-lint: ${{ matrix.check.name }}"
            echo "| Метрика | Значение |"
            echo "|---------|----------|"
            echo "| Duration | ${DURATION}s |"
            echo "| Errors | $ERRORS |"
            echo "| Warnings | $WARNINGS |"
            echo "| Exit code | $EXIT_CODE |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE

  completeness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout curriculum repo
        uses: actions/checkout@v4

      - name: Checkout aisystant/docs (для completeness check)
        uses: actions/checkout@v4
        with:
          repository: aisystant/docs
          path: docs
          token: ${{ secrets.DOCS_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: completeness (WP-322 Ф3.11)
        id: completeness_run
        run: |
          DOCS_CONTENT="docs/docs/ru/personal-design"
          START=$(date +%s)
          if [[ -d "$DOCS_CONTENT" ]]; then
            python3 tools/v4-lint.py completeness specs/v4-reference/ \
              --content-dir "$DOCS_CONTENT" 2>&1 | tee /tmp/completeness-output.txt
            EXIT_CODE=${PIPESTATUS[0]}
          else
            echo "::warning::completeness: $DOCS_CONTENT не найден — docs репо недоступен или структура изменилась"
            echo "::warning::completeness: проверка пропущена. Запустите локально: v4-lint.py completeness specs/v4-reference/ --content-dir <path-to-docs/docs/ru/personal-design>"
            echo "SKIPPED" > /tmp/completeness-output.txt
            EXIT_CODE=0
          fi
          END=$(date +%s)
          DURATION=$((END - START))
          ERRORS=$(grep -oP 'errors=\K\d+' /tmp/completeness-output.txt | tail -1 || echo 0)
          WARNINGS=$(grep -oP 'warnings=\K\d+' /tmp/completeness-output.txt | tail -1 || echo 0)
          {
            echo "## v4-lint: completeness"
            echo "| Метрика | Значение |"
            echo "|---------|----------|"
            echo "| Duration | ${DURATION}s |"
            echo "| Errors | $ERRORS |"
            echo "| Warnings | $WARNINGS |"
            echo "| Exit code | $EXIT_CODE |"
            echo "| Docs content | $([[ -d \"$DOCS_CONTENT\" ]] && echo 'available' || echo 'missing') |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout curriculum repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: smoke-test (фикстуры)
        id: smoke_run
        run: |
          START=$(date +%s)
          bash tools/smoke-test.sh 2>&1 | tee /tmp/smoke-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          END=$(date +%s)
          DURATION=$((END - START))
          ERRORS=$(grep -c 'FAIL' /tmp/smoke-output.txt || echo 0)
          WARNINGS=$(grep -c 'WARN' /tmp/smoke-output.txt || echo 0)
          {
            echo "## v4-lint: smoke-test"
            echo "| Метрика | Значение |"
            echo "|---------|----------|"
            echo "| Duration | ${DURATION}s |"
            echo "| Errors (FAIL lines) | $ERRORS |"
            echo "| Warnings (WARN lines) | $WARNINGS |"
            echo "| Exit code | $EXIT_CODE |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE
